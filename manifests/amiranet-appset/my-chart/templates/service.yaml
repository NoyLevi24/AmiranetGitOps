---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-service-stable
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-app  
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ .Release.Name }}-app
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-service-canary
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-app 
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ .Release.Name }}-app
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}           
