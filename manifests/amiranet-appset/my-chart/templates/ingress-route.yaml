apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ingress
  namespace: {{ .Release.Namespace }}

spec:
  entryPoints:
    - web
  routes:
  - match: PathPrefix(`/`)
    kind: Rule
    services:
    - name: {{ .Release.Name }}-traefik-service
      namespace: {{ .Release.Namespace }}
      kind: TraefikService
